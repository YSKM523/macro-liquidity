name: Database backup

on:
  schedule:
    - cron: '15 2 * * *'
    - cron: '45 2 * * 0'
  workflow_dispatch:
    inputs:
      scope:
        type: choice
        options: [critical, full]
        default: critical

permissions:
  contents: read

jobs:
  backup:
    environment: production-backup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Daily critical or manual backup
        if: github.event.schedule != '45 2 * * 0'
        run: node scripts/backup.mjs --execute --env=production --scope=${{ inputs.scope || 'critical' }} --confirm-production=BACKUP_PRODUCTION
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BACKUP_R2_BUCKET: ${{ vars.BACKUP_R2_BUCKET }}
      - name: Weekly full backup
        if: github.event.schedule == '45 2 * * 0'
        run: node scripts/backup.mjs --execute --env=production --scope=full --confirm-production=BACKUP_PRODUCTION
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BACKUP_R2_BUCKET: ${{ vars.BACKUP_R2_BUCKET }}
