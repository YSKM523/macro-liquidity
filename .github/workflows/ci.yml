name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run test:correctness
      - run: npm run test:no-lookahead
      - run: npm run test:rebuild-consistency
      - run: npm run migrate:verify
      - run: npm run restore:drill
      - run: npm run deploy:dry
