name: Restore verification

on:
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-fixture-restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run restore:drill
