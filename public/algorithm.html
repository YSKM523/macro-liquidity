<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>算法说明 · 美股流动性看板</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>算法说明</h1>
      <a class="nav-link" href="/">← 返回看板</a>
    </header>
    <article class="card prose" id="doc">加载中…</article>
    <p class="muted" style="font-size:0.75rem;margin:1rem 0 2rem;color:#697386;">
      源文档:<a href="/algorithm.md">/algorithm.md</a>(本页为其样式化渲染,内容一致)。
    </p>
  </main>

  <script src="/vendor/marked.min.js"></script>
  <script>
    fetch('/algorithm.md')
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(function (md) {
        marked.setOptions({ gfm: true, breaks: false });
        document.getElementById('doc').innerHTML = marked.parse(md);
      })
      .catch(function (e) {
        document.getElementById('doc').textContent = '加载失败:' + e.message + ' —— 可直接看 /algorithm.md';
      });
  </script>
</body>
</html>
