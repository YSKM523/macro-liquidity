<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>美股流动性看板</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>美股流动性看板</h1>
      <span class="asof" id="asof">—</span>
      <span class="asof" id="data-staleness" style="font-size:0.78rem;margin-left:0.75rem;">—</span>
      <span class="asof" id="data-coverage" style="font-size:0.78rem;margin-left:0.75rem;">—</span>
      <a class="nav-link" href="/algorithm.html" style="margin-left:0.75rem;">算法说明 →</a>
    </header>

    <section class="card verdict" id="verdict-card">
      <div id="stress-banner" style="display:none;background:#B7791F;color:#fff;padding:0.5rem 0.75rem;border-radius:4px;margin-bottom:0.75rem;font-size:0.85rem;font-weight:600;"></div>
      <div class="verdict-main">
        <div class="verdict-label" id="verdict-label">—</div>
        <div class="verdict-reason" id="verdict-reason">加载中…</div>
        <div id="stress-note" style="display:none;font-size:0.78rem;color:#B7791F;margin-top:0.25rem;"></div>
      </div>
      <div class="verdict-sub" id="regime-sub"></div>
    </section>

    <section class="card guidance" id="guidance-card" style="display:none">
      <h2>操作建议 · 仓位旋钮</h2>
      <div class="g-tier"><span class="g-badge" id="g-tier">—</span><span class="g-exposure" id="g-exposure"></span></div>
      <div class="g-lean" id="g-lean"></div>
      <div class="g-diverge" id="g-diverge" style="display:none"></div>
      <ul class="g-triggers" id="g-triggers"></ul>
      <p class="g-note">弱信号风险旋钮,非择时工具;偏空=减仓不是做空;结合你自己的止损与选股。</p>
    </section>

    <div class="grid">
      <section class="card">
        <h2>顺风指数</h2>
        <div class="gauge"><div class="gauge-fill" id="score-gauge"></div></div>
        <div class="score-num" id="score-num">—</div>
        <div class="factor-bars" id="factor-bars"></div>
      </section>
      <section class="card chart-card">
        <h2>净流动性 vs 标普500</h2>
        <div id="chart"></div>
      </section>
    </div>

    <section class="card">
      <h2>因子明细</h2>
      <table class="factor-table" id="factor-table">
        <thead><tr><th>因子</th><th>读数</th><th>状态</th></tr></thead>
        <tbody></tbody>
      </table>
      <p class="muted" style="font-size:0.75rem;margin-top:0.5rem;color:#697386;">注:顶部/此处美元为 ICE DXY(实时,仅展示);打分用的是 FRED 广义美元 DTWEXBGS(可回溯),两者走势一致、绝对值不同。</p>
    </section>
  </main>

  <script src="/vendor/lightweight-charts.standalone.production.js"></script>
  <script src="/app.js"></script>
</body>
</html>
